<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
        }
        nav{
            height: 75px;
            /* border: 2px solid black; */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: gold;
        }
        #logoblock, #menublock{
            height: 75px;
            width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            /* border: 2px solid black; */
        
        }
        #logoblock img{
            height: 200px;
        }
        
        #menublock a{
            text-decoration: none;
            color: black;
        }
       #maincontain{
            height: 83vh;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            /* border: 2px solid black; */
            background-color: lightgray;
        }
        #left, #right{
            height: 300px;
            width: 300px;
            /* border: 2px solid black; */
            display: flex;
             justify-content: center;
             align-items: center;
             background-color: white;
             border-radius: 30px;
             box-shadow: 0px 0px 12px rgba(0, 0, 0, 0.5);
        }
        #left img{
            height: 240px;
        }
        #right img{
            height: 250px;
        }
        </style>
</head>
<body>
    <nav>
       <div id="logoblock">
        <img src="https://cdn.freebiesupply.com/logos/thumbs/2x/apple-music-logo.png" alt="">
        
       </div>
       <div id="menublock" style="width: 600px;">
            <a href="">Home</a>
            <a href="">Contact</a>
            <a href="">About</a>
            <a href="">Profile</a>
        </div>
    </nav>
    <br>
    <div id="maincontain">
        <div id="left">
        <img src="https://dakauf.eu/wp-content/uploads/2024/06/Apple-Airpods-Max-Blue.png" alt="">
        </div>
        <div id="right">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPQJu7zFarn3tYLgKizNBq8a0nuXJq2WKh_A&s" alt="">
        </div>
    </div>
</body>
</html>
