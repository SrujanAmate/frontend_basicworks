<!DOCTYPE html>
<html>
<head>
    <title>GameZone</title>
    <style>
        *{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 🔥 BODY */
        body{
            background-color: #1b2838;
            color: white;
        }

        /* 🔥 NAVBAR */
        nav{
            height: 75px;
            background-color: #171a21;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #logoblock, #menublock{
            height: 75px;
            width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        #logoblock img{
            height: 80px;
        }
        #menublock a{
            text-decoration: none;
            color: white;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
         /* 🔥 MAIN SECTION */
        .main{
            padding: 50px;
        }

        /* 🔥 GRID LAYOUT */
        .game-container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
        }

        /* 🔥 GAME CARD */
        .game-card{
            background-color: #2a475e;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover{
            transform: scale(1.05);
            box-shadow: 0 0 20px #66c0f4;
        }

        .game-card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .price{
            color: #66c0f4;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav>
    <div id="logoblock">
    <img src="https://img.itch.zone/aW1nLzE4MzUyNzU5LnBuZw==/original/8DRbfb.png" alt="">
    </div>
    <div id="menublock" style="width: 600px;">
        <a href="">Home</a>
        <a href="">Products</a>
        <a href="">Community</a>
        <a href="">Support</a>
    </div>
</nav>
<br>
<div class="main">
    <div class="game-container">

        <div class="game-card">
            <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/730/header.jpg">
            <div class="game-info">
                <h3> Counter Strike 2</h3>
                <p class="price">Free</p>
            </div>
        </div>

        <div class="game-card">
            <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg">
            <div class="game-info">
                <h3> GTA V</h3>
                <p class="price">₹2499.00</p>
            </div>
        </div>

        <div class="game-card">
            <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1091500/header.jpg">
            <div class="game-info">
                <h3> CyberPunk 2077</h3>
                <p class="price">₹2999.00</p>
            </div>
        </div>

        <div class="game-card">
            <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1551360/header.jpg">
            <div class="game-info">
                <h3>Forza Horizon 5</h3>
                <p class="price">₹3499.00</p>
            </div>
        </div>

    </div>
</div>

  

</body>
</html>
