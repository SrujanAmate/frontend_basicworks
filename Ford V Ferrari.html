<!DOCTYPE html>
<html>
<head>
    <title>Circle Image Layout</title>
    <style>
        body {
            margin: 0;
            height: 100vh;

            /* Background Image */
            background: url("https://wallpapercave.com/wp/wp4924415.jpg") no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }
    body::before{
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent overlay */
        z-index: -1; /* Ensure overlay is behind content */
}
        .container {
            display: flex;
            gap: 60px; /* Space between circles */
        }

        .circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
